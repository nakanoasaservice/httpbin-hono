name: Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome Check
        run: bun run check

      - name: Run Type Check
        run: bun run check-types

      - name: Run Tests
        run: bun run test
